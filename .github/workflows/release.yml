name: "Publish Release"

on:
  push:
    tags:
      - 'v*' # 当你推送形如 v1.2.4 的 tag 时自动触发打包发布
  workflow_dispatch: # 支持在 GitHub 页面手动点击按钮触发打包


jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64 平台打包
          - platform: "windows-latest"
            args: ""
          # macOS 双架构平台打包 (Apple Silicon + Intel)
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          # Linux x64 平台打包 (Debian/Ubuntu)
          - platform: "ubuntu-22.04"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Publish with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Claude Code 一键配置工具 ${{ github.ref_name }}"
          releaseBody: "🏆 本版本由 GitHub Actions 云端全自动打包生成，包含 Windows (.exe / .msi)、macOS (.dmg)、Linux (.deb / .AppImage) 全平台安装包。\n\n双击对应的安装文件运行即可。"
          args: ${{ matrix.args }}
